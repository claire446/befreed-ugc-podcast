<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<title>BeFreed</title>
<style>
  /* ============================================================
     THEME
     ============================================================ */
  :root{
    --page:#dedacf;                 /* area around the device on iPad */
    --bg-1:#efece4;                 /* app bg (top) */
    --bg-2:#e7e3da;                 /* app bg (bottom) */
    --ink:#2a2824;
    --ink-soft:#8a857b;
    --yellow:#eef23a;
    --orange-1:#ff9233;
    --orange-2:#ff5a00;
    --scale:1;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--page);
    color:var(--ink);
    overflow:hidden;
  }
  .serif{font-family:"Georgia","Times New Roman",serif;}

  /* ---- fluid full-screen app: fills phone edge-to-edge, scales up on iPad ---- */
  #stageWrap{position:fixed; inset:0; overflow:hidden;}
  .app{
    position:absolute; inset:0;
    width:100%; height:100%;
    background:linear-gradient(180deg,var(--bg-1),var(--bg-2));
    overflow:hidden;
  }
  /* content centers within a comfortable reading column; the app background
     always fills the whole screen edge-to-edge — no frame, no border. */
  .screen{ --content:min(100%, 760px); }

  /* ============================================================
     SCREENS
     ============================================================ */
  .screen{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center;
    opacity:0; visibility:hidden; pointer-events:none;
    transition:opacity .4s ease;
  }
  .screen.active{opacity:1; visibility:visible; pointer-events:auto;}
  /* every screen's content is full-width on phone, centered + capped on tablet */
  .screen > *{ width:100%; max-width:var(--content); }
  .lib-scroll{ max-width:none; }      /* scroller spans full width; grid inside is capped */

  .statusbar{
    flex:0 0 auto;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 28px 2px;
    font-weight:600; font-size:15px;
  }
  .statusbar .icons{display:flex; gap:7px; align-items:center;}

  /* ============================================================
     LIBRARY
     ============================================================ */
  .lib-title{padding:10px 26px 4px; font-size:28px; font-weight:800; letter-spacing:-.5px;}
  .lib-sub{padding:0 26px 8px; color:var(--ink-soft); font-size:14px;}
  .lib-scroll{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:10px 22px 30px; width:100%;}
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(clamp(140px, 38vw, 200px), 1fr));
    gap:clamp(16px, 3.4vw, 30px);
    max-width:var(--content); margin-inline:auto;
  }

  .book{position:relative; cursor:pointer; border:0; background:transparent; padding:0; text-align:left; transition:transform .18s;}
  .book:active{transform:scale(.95);}
  /* Girls / Guys version badge on the cover */
  .tag{position:absolute; top:10px; left:10px; z-index:2;
       padding:clamp(5px,1.4vw,9px) clamp(12px,3.4vw,22px); border-radius:30px;
       font-size:clamp(14px,3.8vw,22px); font-weight:800; letter-spacing:.4px; color:#fff;
       text-transform:uppercase; box-shadow:0 4px 12px rgba(0,0,0,.3);}
  .tag.girls{background:#e8458a;}
  .tag.guys{background:#2f7fd1;}
  .cover{
    width:100%; aspect-ratio:2/3;
    border-radius:12px; overflow:hidden;
    box-shadow:0 14px 26px rgba(0,0,0,.16);
    background:#cfcabf;
  }
  .cover img{width:100%;height:100%;object-fit:cover;display:block;}
  .cover.blank{
    background:repeating-linear-gradient(135deg,#e0dcd2,#e0dcd2 12px,#d9d4c9 12px,#d9d4c9 24px);
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.05);
  }
  .cover.ph{display:flex;flex-direction:column;}
  .cover.ph .band{background:var(--yellow);padding:13% 11% 10%;}
  .cover.ph .band h3{font-family:Georgia,serif;font-weight:900;line-height:.95;font-size:19px;letter-spacing:-.6px;text-transform:uppercase;color:#111;}
  .cover.ph .band span{display:block;margin-top:7px;font-size:8.5px;font-weight:700;letter-spacing:1.5px;color:#222;}
  .cover.ph .art{flex:1;display:flex;align-items:center;justify-content:center;font-size:62px;background:linear-gradient(160deg,#0e2a23,#1a4a3f 55%,#a6d9ba);}
  .book h4{margin-top:9px;font-size:14px;font-weight:700;}
  .book p{font-size:12px;color:var(--ink-soft);margin-top:2px;}

  /* ============================================================
     COUNTDOWN
     ============================================================ */
  #countdown{align-items:center; justify-content:center;}
  .count-num{font-family:Georgia,serif;font-weight:700;font-size:clamp(130px,34vmin,300px);line-height:1;color:var(--ink);}
  .count-sub{margin-top:8px;color:var(--ink-soft);letter-spacing:3px;font-size:13px;text-transform:uppercase;}
  @keyframes pop{0%{transform:scale(.45);opacity:0;}22%{transform:scale(1);opacity:1;}78%{transform:scale(1);opacity:1;}100%{transform:scale(1.2);opacity:0;}}
  .count-num.go{animation:pop .92s ease forwards;}

  /* ============================================================
     PLAYER (podcast / listening / responding)
     ============================================================ */
  .topbar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:2px 22px 0;}
  .iconbtn{border:0;background:transparent;cursor:pointer;color:var(--ink);width:42px;height:42px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:15px;font-weight:700;}
  .iconbtn:active{background:rgba(0,0,0,.06);}
  .chev{font-size:30px;line-height:1;font-weight:300;}

  /* middle group: logo -> book -> transcript, tightly stacked & centered */
  .player-mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;--figH:clamp(240px,44vh,470px);}
  .brand{display:flex;align-items:center;justify-content:center;margin-bottom:clamp(10px,2.4vmin,24px);}
  .brand .logo-img{height:clamp(28px,5.2vmin,46px);width:auto;display:block;}

  .stage{position:relative;display:flex;align-items:center;justify-content:center;width:100%;}

  /* background waveform (CSS equalizer) */
  .wave{position:absolute;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:clamp(6px,1.6vmin,12px);pointer-events:none;z-index:0;}
  .wave.left{left:clamp(8px,3vw,42px);} .wave.right{right:clamp(8px,3vw,42px);}
  .wave .bar{width:clamp(6px,1.5vmin,11px);height:clamp(20px,5vmin,34px);border-radius:7px;background:#fff;box-shadow:0 3px 8px rgba(0,0,0,.07);}
  @keyframes eqbar{0%,100%{height:clamp(20px,5vmin,34px)}50%{height:clamp(62px,15vmin,118px)}}
  .is-talking .wave .bar{animation:eqbar 1s ease-in-out infinite;}
  .wave .bar:nth-child(1){animation-duration:1.1s;animation-delay:0s}
  .wave .bar:nth-child(2){animation-duration:.85s;animation-delay:.18s}
  .wave .bar:nth-child(3){animation-duration:1.25s;animation-delay:.05s}
  .wave .bar:nth-child(4){animation-duration:.95s;animation-delay:.28s}

  /* 2D book cover with the original constant bob */
  .figure{position:relative;z-index:1;height:var(--figH);transform-origin:center center;will-change:transform;}
  .figure .cover{height:100%;aspect-ratio:2/3;border-radius:12px;overflow:hidden;box-shadow:0 22px 44px rgba(0,0,0,.26);}
  .figure .cover img{width:100%;height:100%;object-fit:cover;display:block;}
  @keyframes bob{0%{transform:scale(.94)}50%{transform:scale(1.08)}100%{transform:scale(.94)}}
  .is-talking .figure{animation:bob 1.05s ease-in-out infinite;}

  /* caption: left-aligned with the character, word-pop */
  .capwrap{display:none;}   /* transcript hidden for now */
  .caption{
    text-align:left; font-family:Georgia,'Times New Roman',serif;
    font-size:clamp(22px,5.4vmin,38px); font-weight:700; line-height:1.18; color:var(--ink);
    will-change:transform,opacity; transform-origin:left center;
  }
  @keyframes capPop{0%{opacity:0;transform:translateY(6px) scale(.96)}60%{opacity:1;transform:translateY(0) scale(1)}100%{transform:scale(1)}}
  .caption.pop{animation:capPop .2s ease;}

  /* "Now your turn" screen — fades over the book while the audience speaks */
  #yourturn{
    position:absolute; inset:0; z-index:6;
    background:linear-gradient(180deg,var(--bg-1),var(--bg-2));
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:clamp(14px,3vmin,26px);
    opacity:0; visibility:hidden; transition:opacity .45s ease;
    padding-bottom:clamp(120px,22vh,210px);
  }
  .app[data-state="listening"] #yourturn{opacity:1; visibility:visible;}
  .yt-rings{position:relative;width:clamp(130px,32vmin,200px);height:clamp(130px,32vmin,200px);display:flex;align-items:center;justify-content:center;}
  .yt-rings span{position:absolute;inset:0;border-radius:50%;border:2px solid var(--orange-2);opacity:0;animation:ytring 2.4s ease-out infinite;}
  .yt-rings span:nth-child(2){animation-delay:.8s}
  .yt-rings span:nth-child(3){animation-delay:1.6s}
  @keyframes ytring{0%{transform:scale(.42);opacity:.45}100%{transform:scale(1.05);opacity:0}}
  .yt-mic{width:clamp(82px,20vmin,120px);height:clamp(82px,20vmin,120px);border-radius:50%;background:linear-gradient(180deg,var(--orange-1),var(--orange-2));display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 16px 36px rgba(255,90,0,.42), inset 0 1px 0 rgba(255,255,255,.35);}
  .yt-mic svg{width:44%;height:44%;}
  .yt-title{font-family:Georgia,serif;font-weight:700;font-size:clamp(27px,7.2vmin,46px);color:var(--ink);}
  .yt-hint{font-size:clamp(13px,3.6vmin,17px);color:var(--ink-soft);}

  .bottom{flex:0 0 auto;position:relative;z-index:10;padding:8px 28px max(30px, env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:center;}
  .talk-btn{
    display:none;                 /* hidden by default; only shows on the podcast page */
    width:100%;max-width:clamp(300px,80%,420px);height:clamp(58px,8vmin,72px);border:0;cursor:pointer;border-radius:40px;
    background:linear-gradient(180deg,var(--orange-1),var(--orange-2));
    color:#fff;font-weight:800;font-size:19px;align-items:center;justify-content:center;gap:11px;
    box-shadow:0 14px 28px rgba(255,90,0,.4), inset 0 1px 0 rgba(255,255,255,.35);
    transition:transform .12s;
  }
  .talk-btn:active{transform:scale(.97);}
  .talk-btn .eq{display:flex;gap:3px;align-items:center;height:20px;}
  .talk-btn .eq i{width:3px;background:#fff;border-radius:2px;animation:teq 1s ease-in-out infinite;}
  .talk-btn .eq i:nth-child(1){height:8px}
  .talk-btn .eq i:nth-child(2){height:18px;animation-delay:.15s}
  .talk-btn .eq i:nth-child(3){height:11px;animation-delay:.3s}
  .talk-btn .eq i:nth-child(4){height:18px;animation-delay:.45s}
  @keyframes teq{0%,100%{transform:scaleY(.45)}50%{transform:scaleY(1)}}

  .talk-ctrl{display:none;gap:clamp(24px,6vmin,48px);align-items:center;justify-content:center;}
  .round{width:clamp(60px,11vmin,86px);height:clamp(60px,11vmin,86px);border-radius:50%;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 26px rgba(0,0,0,.2);transition:transform .12s;}
  .round:active{transform:scale(.92);}
  .round.mic{background:#fff;color:#1c1c1c;}
  .round.mic.live{box-shadow:0 0 0 0 rgba(255,90,0,.5);animation:pulse 1.5s infinite;}
  .round.close{background:#1c1c1c;color:#fff;}
  .round svg{width:clamp(24px,4.6vmin,36px);height:clamp(24px,4.6vmin,36px);}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,90,0,.45)}70%{box-shadow:0 0 0 20px rgba(255,90,0,0)}100%{box-shadow:0 0 0 0 rgba(255,90,0,0)}}

  /* ---- state visibility ----
     podcast   : Talk button only
     listening : mic + X only,  below-book slot shows "Listening …"
     responding: mic + X only,  below-book slot shows reply transcript */
  .app[data-state="podcast"]    .talk-btn{display:flex;}
  .app[data-state="listening"]  .talk-ctrl,
  .app[data-state="responding"] .talk-ctrl{display:flex;}

  /* ============================================================
     PASSWORD GATE (shown first, covers everything until unlocked)
     ============================================================ */
  #gate{
    position:absolute; inset:0; z-index:100;
    background:linear-gradient(180deg,var(--bg-1),var(--bg-2));
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:0 32px; text-align:center;
    transition:opacity .4s ease;
  }
  #gate.hidden{opacity:0; visibility:hidden; pointer-events:none;}
  .gate-logo{height:clamp(34px,6vmin,54px); width:auto; margin-bottom:clamp(26px,6vmin,52px);}
  .gate-title{font-size:clamp(21px,5vmin,32px); font-weight:800; letter-spacing:-.3px; margin-bottom:8px;}
  .gate-sub{color:var(--ink-soft); font-size:clamp(13px,3.4vmin,17px); line-height:1.4; margin-bottom:clamp(22px,5vmin,40px); max-width:300px;}
  .gate-form{width:100%; max-width:340px; display:flex; flex-direction:column; gap:14px;}
  .gate-input{
    width:100%; height:clamp(52px,8vmin,64px); border-radius:16px; border:1.5px solid #d9d4c9;
    background:#fff; padding:0 18px; font-size:17px; color:var(--ink); outline:none; text-align:center;
    transition:border-color .15s;
  }
  .gate-input:focus{border-color:var(--orange-2);}
  .gate-input.err{border-color:#e53935; animation:shake .35s;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}60%{transform:translateX(8px)}80%{transform:translateX(-5px)}}
  .gate-btn{
    width:100%; height:clamp(52px,8vmin,64px); border:0; border-radius:16px; cursor:pointer;
    background:linear-gradient(180deg,var(--orange-1),var(--orange-2)); color:#fff;
    font-weight:800; font-size:18px; box-shadow:0 12px 26px rgba(255,90,0,.34);
    transition:transform .12s;
  }
  .gate-btn:active{transform:scale(.97);}
  .gate-err{color:#e53935; font-size:14px; min-height:18px;}
</style>
</head>
<body>
<div id="stageWrap">
  <div class="app" id="app" data-state="podcast">

    <!-- ============ PASSWORD GATE ============ -->
    <div id="gate">
      <img class="gate-logo" src="assets/befreed-logo.png" alt="BeFreed">
      <div class="gate-title">Enter password</div>
      <div class="gate-sub">This library is private. Enter the password to continue.</div>
      <form class="gate-form" id="gateForm">
        <input class="gate-input" id="gateInput" type="password" placeholder="Password"
               autocomplete="current-password" autocapitalize="off" autocorrect="off" spellcheck="false">
        <div class="gate-err" id="gateErr"></div>
        <button class="gate-btn" type="submit">Enter</button>
      </form>
    </div>

    <!-- ============ LIBRARY ============ -->
    <section class="screen active" id="library">
      <div class="statusbar">
        <span>9:41</span>
        <span class="icons">
          <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
          <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="3" fill="none" stroke="#2a2824" opacity=".5"/><rect x="2" y="2" width="18" height="8" rx="1.5"/><rect x="23.5" y="4" width="2" height="4" rx="1" opacity=".5"/></svg>
        </span>
      </div>
      <div class="lib-title">Library</div>
      <div class="lib-sub">Tap a book to start listening</div>
      <div class="lib-scroll"><div class="grid" id="grid"></div></div>
    </section>

    <!-- ============ COUNTDOWN ============ -->
    <section class="screen" id="countdown">
      <div style="text-align:center">
        <div class="count-num" id="countNum">5</div>
        <div class="count-sub">Get ready</div>
      </div>
    </section>

    <!-- ============ PLAYER ============ -->
    <section class="screen" id="player">
      <div class="statusbar">
        <span>9:41</span>
        <span class="icons">
          <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
          <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="3" fill="none" stroke="#2a2824" opacity=".5"/><rect x="2" y="2" width="18" height="8" rx="1.5"/><rect x="23.5" y="4" width="2" height="4" rx="1" opacity=".5"/></svg>
        </span>
      </div>

      <div class="topbar">
        <button class="iconbtn chev" id="backBtn" aria-label="Back">‹</button>
        <button class="iconbtn" aria-label="Text size">Aa</button>
      </div>

      <div class="player-mid">
        <div class="brand"><img src="assets/befreed-logo.png" alt="BeFreed" class="logo-img"></div>

        <div class="stage">
          <div class="wave left"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
          <div class="figure" id="figure" data-mouth="idle"></div>
          <div class="wave right"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
        </div>

        <div class="capwrap"><div class="caption serif" id="caption"></div></div>
      </div>

      <div id="yourturn">
        <div class="yt-rings"><span></span><span></span><span></span>
          <div class="yt-mic"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z" fill="currentColor"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></div>
        </div>
        <div class="yt-title">Now your turn</div>
        <div class="yt-hint">Tap the mic when you're done</div>
      </div>

      <div class="bottom">
        <button class="talk-btn" id="talkBtn">
          <span class="eq"><i></i><i></i><i></i><i></i></span>Talk
        </button>
        <div class="talk-ctrl">
          <button class="round mic" id="micBtn" aria-label="Mic">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z" fill="currentColor"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>
          <button class="round close" id="closeBtn" aria-label="Exit">
            <svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
    </section>

  </div>
</div>

<script>
/* ============================================================
   BOOKS CONFIG
   Each book is a turn-based conversation: `clips` is an ordered list of
   the book's spoken replies. clip[0] auto-plays on entry; tapping the
   mic advances to the next clip (with a "Listening" gap in between for
   the live audience to speak). `text` is the transcript shown under the
   cover while that clip plays.
   ============================================================ */
const BOOKS = [
  {
    id:"sapiens", title:"Sapiens", author:"Yuval Noah Harari",
    cover:"assets/sapiens.jpg",
    faces:{ idle:"assets/face-idle.png", closed:"assets/face-closed.png", open:"assets/face-open.png" },
    clips:[
      { src:"assets/script1-1.mp3",
        text:"OH you wanna read me NOW?? After THREE YEARS?? You left me on read longer than your situationship. That's delulu. Lock in!",
        // explicit cue times (seconds) so the ~2s laugh at 2.8-4.6 is reflected & in sync
        caps:[
          {t:0.0,  text:"HAHAHA"},
          {t:0.3,  text:"you wanna"},
          {t:0.7,  text:"read me NOW??"},
          {t:2.1,  text:"After THREE YEARS??"},
          {t:4.7,  text:"You left me"},
          {t:5.5,  text:"on read longer"},
          {t:7.1,  text:"than your"},
          {t:7.9,  text:"situationship."},
          {t:10.3, text:"That's delulu!"},
          {t:11.9, text:"Lock in!"},
        ] },
      { src:"assets/script1-2.mp3", text:"You SHOULD be. Minus ten thousand aura. No cap." },
      { src:"assets/script1-3.mp3", text:"Anyway! Chapter one. 70,000 years ago a random ape started yapping… and took over the entire planet. Lowkey iconic." },
    ],
  },
  {
    id:"atomic", title:"Atomic Habits", author:"James Clear", cover:"assets/atomic-habits.jpg",
    tag:"Girls",          // female-voice version
    talkPlaysNext:true,   // tap Talk -> book reacts first, then your turn
    clips:[
      { src:"assets/power-1.mp3", text:"Missing habits twice creates… a dangerous pattern. So focusing on tiny one percent enhancements in everything in life gives back more control. One percent improvement daily compounds to nearly thirty-seven times better performance over a year." },
      { src:"assets/power-2.mp3", text:"What? Looks like someone has questions again…" },
      { src:"assets/power-3b.mp3", text:"Ya, that's an interesting observation. As an AI book I don't really have the ability to cough or have sensation, nor would I have human emotion." },
    ],
  },
  {
    id:"atomic-guys", title:"Atomic Habits", author:"James Clear", cover:"assets/atomic-habits.jpg",
    tag:"Guys",           // male-voice version
    talkPlaysNext:true,
    clips:[
      { src:"assets/guy-1.mp3", text:"Missing habits twice creates… a dangerous pattern. So focusing on tiny one percent enhancements in everything in life gives back more control. One percent improvement daily compounds to nearly thirty-seven times better performance over a year." },
      { src:"assets/guy-3b.m4a", text:"What? Looks like someone has questions again…" },
      { src:"assets/guy-3.mp3", text:"Ya, that's an interesting observation. As an AI book I don't really have the ability to cough or have sensation, nor would I have human emotion." },
    ],
  },
  {
    id:"attached", title:"Attached", author:"Amir Levine & Rachel Heller", cover:"assets/attached.jpg",
    clips:[

const $ = s => document.querySelector(s);
const app = $("#app");
const player = $("#player");

/* ============================================================
   PASSWORD GATE — SHA-256 hash check, unlock remembered per session
   ============================================================ */
const PASS_HASH = "95f7a7097c4e6de04e36c508539ea015ef84fa3ec1134c88daaaf06f2fe529ec";
const gate = $("#gate"), gateForm = $("#gateForm"), gateInput = $("#gateInput"), gateErr = $("#gateErr");
async function sha256hex(s){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}
function unlock(){ gate.classList.add("hidden"); }
if(sessionStorage.getItem("bf_unlocked")==="1"){ unlock(); }
else { setTimeout(()=>gateInput && gateInput.focus(), 200); }
gateForm.addEventListener("submit", async (e)=>{
  e.preventDefault();
  const h = await sha256hex(gateInput.value);
  if(h === PASS_HASH){
    sessionStorage.setItem("bf_unlocked","1");
    gateErr.textContent = "";
    unlock();
  }else{
    gateErr.textContent = "Incorrect password";
    gateInput.classList.add("err"); gateInput.select();
    setTimeout(()=>gateInput.classList.remove("err"), 420);
  }
});

/* ---- cover element (with image fallback to placeholder) ---- */
function coverEl(book){
  const wrap = document.createElement("div");
  if(book.blank){ wrap.className = "cover blank"; return wrap; }
  if(book.cover){
    wrap.className = "cover";
    const img = new Image();
    img.alt = book.title;
    img.onerror = () => { const ph = placeholder(book); wrap.replaceWith(ph); };
    img.src = book.cover;
    wrap.appendChild(img);
    return wrap;
  }
  return placeholder(book);
}
function placeholder(book){
  const d = document.createElement("div");
  d.className = "cover ph";
  d.innerHTML = `<div class="band"><h3>${book.title}</h3><span>${book.author}</span></div><div class="art">👂</div>`;
  return d;
}

/* ---- build library ---- */
const grid = $("#grid");
BOOKS.forEach((book,i)=>{
  const btn = document.createElement("button");
  btn.className = "book";
  btn.appendChild(coverEl(book));
  if(book.tag){
    const tg = document.createElement("span");
    tg.className = "tag " + book.tag.toLowerCase();
    tg.textContent = book.tag;
    btn.appendChild(tg);
  }
  if(!book.blank){
    const h = document.createElement("h4"); h.textContent = book.title; btn.appendChild(h);
    const p = document.createElement("p"); p.textContent = book.author; btn.appendChild(p);
    btn.addEventListener("click", ()=>openBook(i));
  }else{
    btn.disabled = true; btn.style.cursor = "default";
  }
  grid.appendChild(btn);
});

/* ============================================================
   PLAYER LOGIC
   ============================================================ */
let current=null, clipIndex=0;
const audioEl = new Audio();
const figureEl=$("#figure"), captionEl=$("#caption");
const waveBars = [...document.querySelectorAll("#player .wave .bar")];
const talkBtn=$("#talkBtn"), micBtn=$("#micBtn"), closeBtn=$("#closeBtn");

function setScreen(id){ document.querySelectorAll(".screen").forEach(s=>s.classList.toggle("active",s.id===id)); }
function setTalkingAnim(on){ player.classList.toggle("is-talking", on); }
function stopAudio(){ audioEl.pause(); audioEl.onended=null; }

/* build the player figure: animated character (3 mouth frames) or a flat cover */
function buildFigure(book){
  figureEl.innerHTML = "";
  figureEl.style.transform = "";
  figureEl.appendChild(coverEl(book));   // flat 2D cover
}

/* ---- Web Audio: read the playing clip's loudness to drive mouth + bounce + bars ---- */
let actx=null, analyser=null, freqData=null;
function setupAudioGraph(){
  if(actx) return;
  try{
    actx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = actx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.55;
    freqData = new Uint8Array(analyser.frequencyBinCount);
    const src = actx.createMediaElementSource(audioEl);
    src.connect(analyser);
    analyser.connect(actx.destination);
  }catch(e){ analyser = null; }
}
function liveAmp(){
  if(!analyser) return -1;                       // -1 => use synthetic motion
  analyser.getByteFrequencyData(freqData);
  let s=0; const n=Math.min(36, freqData.length);
  for(let i=2;i<n;i++) s += freqData[i];
  return Math.min(1, (s/(n-2))/170);
}
let rafFace=0, ampS=0;
function faceLoop(ts){
  rafFace = requestAnimationFrame(faceLoop);
  const speaking = player.classList.contains("is-talking");
  let amp = 0;
  if(speaking){
    const a = liveAmp();
    amp = (a >= 0) ? a : Math.max(0, (Math.sin(ts*0.013)+Math.sin(ts*0.031)*0.7+Math.sin(ts*0.07)*0.4)/2.1);
  }
  ampS += (amp - ampS) * 0.4;
  if(figureEl){                       // gentle voice-driven bob (no mouth animation)
    figureEl.style.transform = `translateY(${(-ampS*6).toFixed(1)}px) scale(${(1+ampS*0.03).toFixed(3)})`;
  }
  for(let i=0;i<waveBars.length;i++){
    const v = speaking ? Math.max(0.12, ampS*(0.7+0.5*Math.sin(ts*0.012+i*1.3))) : 0.12;
    waveBars[i].style.height = (16 + v*86).toFixed(0)+"px";
  }
}
function startFaceLoop(){ if(!rafFace) rafFace = requestAnimationFrame(faceLoop); }
function stopFaceLoop(){ if(rafFace){ cancelAnimationFrame(rafFace); rafFace=0; } if(figureEl) figureEl.style.transform=""; }

/* One reusable <audio> element. iOS Safari only lets audio play if it was
   unlocked inside a real tap, so we prime it ONCE on the first book tap.
   (Re-priming on every entry could pause the real playback.) */
let primed = false;
function primeAudio(){
  if(primed) return;
  const first = current.clips && current.clips[0];
  if(!first || !first.src) return;     // nothing to unlock with yet
  primed = true;
  audioEl.src = first.src;
  audioEl.muted = true;
  const p = audioEl.play();
  if(p) p.then(()=>{ audioEl.pause(); audioEl.currentTime=0; audioEl.muted=false; })
         .catch(()=>{ audioEl.muted=false; });
}

function openBook(i){
  current = BOOKS[i];
  buildFigure(current);
  primeAudio();           // unlock audio within the user gesture
  startCountdown();
}

function startCountdown(){
  setScreen("countdown");
  const num=$("#countNum"); let n=5;
  const show=()=>{num.textContent=n;num.classList.remove("go");void num.offsetWidth;num.classList.add("go");};
  show();
  const iv=setInterval(()=>{ n--; if(n<=0){clearInterval(iv);enterPlayer();return;} show(); },950);
}

function enterPlayer(){
  setScreen("player");
  playClip(0);                       // book speaks its opening line on entry
}

/* ============================================================
   CONVERSATION ENGINE
   clip 0 auto-plays (podcast). Each clip end -> "Listening" (audience's
   turn). Tap mic -> book speaks the next clip. Tap X -> end & exit.
   ============================================================ */
function playClip(i){
  clipIndex = i;
  const clip = current.clips[i];
  app.dataset.state = (i === 0) ? "podcast" : "responding";   // both = book speaking
  setTalkingAnim(true);
  micBtn.classList.remove("live");
  stopAudio();
  if(clip.src){
    audioEl.muted = false;
    audioEl.src = clip.src;          // always (re)load so it reliably restarts
    // opening line (clip 0) keeps the Talk button; later clips auto-wait for the audience
    audioEl.onended = (i === 0) ? ()=>setTalkingAnim(false) : goListening;
    audioEl.play().catch(()=>{});
  }
}

function goListening(){
  app.dataset.state = "listening";     // book idle, audience speaks
  stopAudio();
  stopCaption();
  setTalkingAnim(false);
  micBtn.classList.add("live");
}

function exitToLibrary(){
  stopAudio();
  stopCaption();
  setTalkingAnim(false);
  micBtn.classList.remove("live");
  app.dataset.state = "podcast";
  clipIndex = 0;
  setScreen("library");
}

/* ============================================================
   CAPTION ENGINE — Option A: sentence-aware 2–3 word pops, driven by
   the clip's real playback progress (currentTime / duration). No word
   timestamps needed; punctuation adds pause weight so dramatic beats
   (??, ., !) hold a touch longer.
   ============================================================ */
function groupSizes(n){                // split a sentence into 2–3 word groups, no orphans
  const s=[];
  while(n>0){
    if(n===1){ if(s.length) s[s.length-1]++; else s.push(1); n=0; }
    else if(n===2){ s.push(2); n=0; }
    else if(n===3){ s.push(3); n=0; }
    else if(n===4){ s.push(2); n=2; }
    else { s.push(3); n-=3; }
  }
  return s;
}
function buildChunks(text){
  const sentences = text.match(/[^.!?…]+[.!?…]*/g) || [text];   // keep terminal punctuation
  const chunks=[];
  sentences.forEach(seg=>{
    const ws = seg.trim().split(/\s+/).filter(Boolean);
    if(!ws.length) return;
    let k=0;
    groupSizes(ws.length).forEach(sz=>{ chunks.push(ws.slice(k,k+sz)); k+=sz; });
  });
  const weights = chunks.map(c=>{
    let w=0; c.forEach(word=>{ w += (word.match(/[A-Za-z0-9]/g)||[]).length + 1; });
    const last=c[c.length-1];
    if(/\?\?|!!/.test(last)) w += 14;
    else if(/[?!]$/.test(last)) w += 9;
    else if(/[.…]$/.test(last)) w += 7;
    else if(/,$/.test(last)) w += 3;
    return w;
  });
  const totalW = weights.reduce((a,b)=>a+b,0) || 1;
  const cum=[]; let acc=0;
  for(let i=0;i<weights.length;i++){ cum.push(acc/totalW); acc+=weights[i]; }
  cum.push(1);
  return { text: chunks.map(c=>c.join(" ")), cum };
}
let capData=null, capRaf=0, capLastIdx=-1;
function startCaption(clip){
  stopCaption();
  capLastIdx=-1;
  if(clip && clip.caps && clip.caps.length){          // explicit cue times (seconds)
    capData = { text: clip.caps.map(c=>c.text), times: clip.caps.map(c=>c.t) };
    capLoop();
  }else if(clip && clip.text && clip.src){            // auto: proportional 2-3 word pops
    capData = buildChunks(clip.text);
    capLoop();
  }else{
    capData=null;
    showChunk(clip ? (clip.text||"") : "");
  }
}
function stopCaption(){ if(capRaf){ cancelAnimationFrame(capRaf); capRaf=0; } }
function capLoop(){
  capRaf = requestAnimationFrame(capLoop);
  if(!capData) return;
  let idx=0;
  if(capData.times){
    const t = audioEl.currentTime;
    for(let i=0;i<capData.times.length;i++){ if(capData.times[i] <= t) idx=i; else break; }
  }else{
    const dur = audioEl.duration;
    const prog = (dur && isFinite(dur)) ? Math.min(0.9999, audioEl.currentTime/dur) : 0;
    for(let i=0;i<capData.text.length;i++){ if(prog>=capData.cum[i] && prog<capData.cum[i+1]){ idx=i; break; } }
  }
  if(idx!==capLastIdx){ showChunk(capData.text[idx]); capLastIdx=idx; }
}
function showChunk(txt){
  captionEl.textContent = txt;
  captionEl.classList.remove("pop"); void captionEl.offsetWidth; captionEl.classList.add("pop");
}

/* ---- buttons ---- */
talkBtn.addEventListener("click", ()=>{
  // talkPlaysNext (48 Laws): book reacts with its next line first, then your turn.
  // default (Sapiens, Attached): tapping Talk hands the turn straight to you.
  if(current.talkPlaysNext && clipIndex + 1 < current.clips.length) playClip(clipIndex + 1);
  else goListening();
});
closeBtn.addEventListener("click", exitToLibrary);  // X: end the conversation
$("#backBtn").addEventListener("click", exitToLibrary);
micBtn.addEventListener("click", ()=>{
  if(app.dataset.state === "listening"){
    if(clipIndex + 1 < current.clips.length) playClip(clipIndex + 1);  // audience done -> next line
    // else: last line already played — stay listening (conversation over)
  } else {
    goListening();                     // book mid-reply -> stop, hand to audience
  }
});

/* dev shortcut: ?screen=player&state=podcast|listening|responding&book=0&clip=0 */
(function(){
  const q = new URLSearchParams(location.search);
  if(q.get("screen")!=="player") return;
  current = BOOKS[+(q.get("book")||0)];
  buildFigure(current);
  if(q.get("mouth")) figureEl.dataset.mouth = q.get("mouth");
  setScreen("player");
  clipIndex = +(q.get("clip")||0);
  const st = q.get("state")||"podcast";
  app.dataset.state = st;
  setTalkingAnim(st==="podcast"||st==="responding");
  if(st==="listening") micBtn.classList.add("live");
  const clip = current.clips && current.clips[clipIndex];
  if(clip){
    const ch = +(q.get("chunk")||0);
    if(clip.caps) captionEl.textContent = (clip.caps[ch]||clip.caps[0]).text;
    else if(clip.text){ const cd=buildChunks(clip.text); captionEl.textContent = cd.text[ch] || cd.text[0]; }
  }
})();
